name: Dev Branch CI

on:
  push:
    branches:
      - "dev-*"
  pull_request:
    branches:
      - "dev-*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Typecheck, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  docker-build:
    name: Docker build (smoke test)
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: api/Dockerfile
          push: false
          tags: saas-api:${{ github.sha }}
