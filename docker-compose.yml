version: "3.9"

# Local development stack — Postgres + PgBouncer
# Run: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: realestate_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/realestate_dev
      POOL_MODE: transaction        # Transaction pooling — PgBouncer-safe
      MAX_CLIENT_CONN: 100
      DEFAULT_POOL_SIZE: 5         # Matches packages/db pool max
    ports:
      - "6432:5432"                # Connect via PgBouncer on port 6432
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
